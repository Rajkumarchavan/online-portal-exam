<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Portal Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="login-page">
<div class="login-container">

<!-- Left Panel -->
<div class="left-panel">
    <img src="static/Logo.png" alt="Exam Portal Logo" class="portal-logo">
    <h1> ExamSphere</h1>
    <p>
        Assess. Learn. Achieve.
    </p>
</div>

<!-- Right Panel -->
<div class="right-panel">
    <div class="login-box">

        <h2 id="formTitle">Welcome Back</h2>
        <div class="alert" id="loginAlert"></div>

        <!-- LOGIN FORM -->
        <div id="loginForm">
            <div class="input-group">
                <label>Email </label>
                <input type="email" id="loginEmail" placeholder="Enter your email" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password" required>
            </div>
            <div class="forgot-container">
                <a href="#" class="forgot" onclick="showForgotPassword(); return false;">Forgot Password?</a>
            </div>
            <button class="login-btn" onclick="login()">
                <span id="loginBtnText">Login</span>
            </button>
            <div class="register">
                Don't have an account?
                <a href="#" onclick="showRegister(); return false;">Register</a>
            </div>
            <!-- <div class="demo-creds">
                <p><strong>Demo Credentials</strong></p>
                <p>Admin: admin@exam.com / admin123</p>
                <p>Student: student@exam.com / student123</p>
            </div> -->
        </div>

        <!-- REGISTER FORM -->
        <div id="registerForm" style="display:none;">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="regName" placeholder="Enter your full name" required>
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="regEmail" placeholder="Enter your email" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="regPassword" placeholder="Create a password (min 6 chars)" required>
            </div>
            <button class="login-btn" onclick="register()">
                <span id="regBtnText">Register</span>
            </button>
            <div class="register">
                Already have an account?
                <a href="#" onclick="showLogin(); return false;">Login</a>
            </div>
        </div>

        <!-- FORGOT PASSWORD FORM -->
        <div id="forgotForm" style="display:none;">
            <div class="input-group">
                <label>Registered Email</label>
                <input type="email" id="forgotEmail" placeholder="Enter your registered email" required>
            </div>
            <div class="input-group">
                <label>New Password</label>
                <input type="password" id="forgotNewPassword" placeholder="Enter new password (min 6 chars)" required>
            </div>
            <button class="login-btn" onclick="resetPassword()">
                <span id="forgotBtnText">Reset Password</span>
            </button>
            <div class="register">
                Remember your password?
                <a href="#" onclick="showLogin(); return false;">Login</a>
            </div>
        </div>

    </div>
</div>

</div>
</div>

<script src="js/app.js"></script>

<script>

    /* ── Redirect if already logged in ── */
    if (localStorage.getItem('token')) {
        const role = localStorage.getItem('role');
        window.location.href = role === 'ADMIN' ? 'admin-dashboard.html' : 'student-dashboard.html';
    }

    /* ── Alert helper ── */
    function showAlert(message, type = 'error') {
        const alertBox = document.getElementById('loginAlert');
        alertBox.textContent = message;
        alertBox.className = 'alert ' + type;
        alertBox.style.display = 'block';
        setTimeout(() => { alertBox.style.display = 'none'; }, 4000);
    }

    /* ── Form switchers ── */
    function showLogin() {
        document.getElementById('loginForm').style.display    = 'block';
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('forgotForm').style.display   = 'none';
        document.getElementById('formTitle').textContent      = 'Welcome Back';
        document.getElementById('loginAlert').style.display   = 'none';
    }

    function showRegister() {
        document.getElementById('loginForm').style.display    = 'none';
        document.getElementById('registerForm').style.display = 'block';
        document.getElementById('forgotForm').style.display   = 'none';
        document.getElementById('formTitle').textContent      = 'Create Account';
        document.getElementById('loginAlert').style.display   = 'none';
    }

    function showForgotPassword() {
        document.getElementById('loginForm').style.display    = 'none';
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('forgotForm').style.display   = 'block';
        document.getElementById('formTitle').textContent      = 'Reset Password';
        document.getElementById('loginAlert').style.display   = 'none';
    }

    /* ── LOGIN ── */
    async function login() {
        const email    = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        const btn      = document.getElementById('loginBtnText');

        if (!email || !password) { showAlert('Please fill all fields'); return; }

        btn.textContent = 'Logging in...';
        try {
            const res = await api.post('/auth/login', { email, password });

            localStorage.setItem('token',  res.token);
            localStorage.setItem('role',   res.role);
            localStorage.setItem('name',   res.name);
            localStorage.setItem('userId', res.id);

            window.location.href = res.role === 'ADMIN'
                ? 'admin-dashboard.html'
                : 'student-dashboard.html';

        } catch (err) {
            showAlert(err.message || 'Login failed. Check your credentials.');
            btn.textContent = 'Login';
        }
    }

    /* ── REGISTER → POST /api/auth/register ── */
    async function register() {
        const name     = document.getElementById('regName').value.trim();
        const email    = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        const btn      = document.getElementById('regBtnText');

        if (!name || !email || !password) { showAlert('Please fill all fields'); return; }
        if (password.length < 6)          { showAlert('Password must be at least 6 characters'); return; }

        btn.textContent = 'Registering...';
        try {
            await api.post('/auth/register', { name, email, password, role: 'STUDENT' });
            showAlert('Registration successful! Please login.', 'success');
            setTimeout(showLogin, 1500);
        } catch (err) {
            showAlert(err.message || 'Registration failed. Email may already be in use.');
        } finally {
            btn.textContent = 'Register';
        }
    }

    /* ── RESET PASSWORD → POST /api/auth/reset-password ── */
    async function resetPassword() {
        const email       = document.getElementById('forgotEmail').value.trim();
        const newPassword = document.getElementById('forgotNewPassword').value;
        const btn         = document.getElementById('forgotBtnText');

        if (!email || !newPassword) { showAlert('Please fill all fields'); return; }
        if (newPassword.length < 6) { showAlert('Password must be at least 6 characters'); return; }

        btn.textContent = 'Resetting...';
        try {
            await api.post('/auth/reset-password', { email, newPassword });
            showAlert('Password reset successful! Please login.', 'success');
            setTimeout(showLogin, 1500);
        } catch (err) {
            showAlert(err.message || 'Reset failed. Email may not be registered.');
        } finally {
            btn.textContent = 'Reset Password';
        }
    }

</script>

</body>
</html>
