<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Exam Portal - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="logo-icon">📝</div>
            <h1>ExamPortal</h1>
            <p>Online Examination System</p>
        </div>

        <!-- Toggle Tabs -->
        <div class="auth-tabs">
            <button class="tab-btn active" onclick="showTab('login')">Login</button>
            <button class="tab-btn" onclick="showTab('register')">Register</button>
        </div>

        <!-- Login Form -->
        <div id="loginTab" class="tab-content">
            <div class="alert" id="loginAlert"></div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="loginEmail" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password" required>
            </div>
            <button class="btn btn-primary btn-full" onclick="login()">
                <span id="loginBtnText">Login</span>
            </button>
            <div class="demo-creds">
                <p><strong>Demo Credentials:</strong></p>
                <p>Admin: admin@exam.com / admin123</p>
                <p>Student: student@exam.com / student123</p>
            </div>
        </div>

        <!-- Register Form -->
        <div id="registerTab" class="tab-content hidden">
            <div class="alert" id="registerAlert"></div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="regName" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="regEmail" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="regPassword" placeholder="Create a password" required>
            </div>
            <button class="btn btn-primary btn-full" onclick="register()">Create Account</button>
        </div>
    </div>
</div>

<script src="js/app.js"></script>
<script>
    // Redirect if already logged in
    if (localStorage.getItem('token')) {
        const role = localStorage.getItem('role');
        window.location.href = role === 'ADMIN' ? 'admin-dashboard.html' : 'student-dashboard.html';
    }

    function showTab(tab) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tab + 'Tab').classList.remove('hidden');
        event.target.classList.add('active');
    }

    async function login() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const btn = document.getElementById('loginBtnText');

        if (!email || !password) {
            showAlert('loginAlert', 'Please fill all fields', 'error');
            return;
        }

        btn.textContent = 'Logging in...';
        try {
            const res = await api.post('/auth/login', { email, password });
            localStorage.setItem('token', res.token);
            localStorage.setItem('role', res.role);
            localStorage.setItem('name', res.name);
            localStorage.setItem('userId', res.id);

            window.location.href = res.role === 'ADMIN' ? 'admin-dashboard.html' : 'student-dashboard.html';
        } catch (err) {
            showAlert('loginAlert', err.message || 'Login failed', 'error');
            btn.textContent = 'Login';
        }
    }

    async function register() {
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;

        if (!name || !email || !password) {
            showAlert('registerAlert', 'Please fill all fields', 'error');
            return;
        }

        try {
            const res = await api.post('/auth/register', { name, email, password });
            showAlert('registerAlert', res.message, 'success');
            setTimeout(() => showTab('login'), 1500);
        } catch (err) {
            showAlert('registerAlert', err.message || 'Registration failed', 'error');
        }
    }
</script>
</body>
</html>
