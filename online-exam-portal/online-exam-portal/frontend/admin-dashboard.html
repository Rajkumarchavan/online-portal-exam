<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - ExamPortal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="nav-brand">📝 ExamPortal <span class="badge-admin">ADMIN</span></div>
    <div class="nav-links">
        <button class="nav-btn active" onclick="showSection('dashboard')">Dashboard</button>
        <button class="nav-btn" onclick="showSection('exams')">Manage Exams</button>
        <button class="nav-btn" onclick="showSection('results')">Results</button>
    </div>
    <div class="nav-user">
        <span>👤 <span id="adminName"></span></span>
        <button class="btn btn-outline btn-sm" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="container">

    <!-- Dashboard Stats -->
    <div id="dashboardSection">
        <div class="section-header">
            <h2>📊 Admin Dashboard</h2>
        </div>
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card"><div class="stat-num" id="statStudents">-</div><div class="stat-label">Total Students</div></div>
            <div class="stat-card"><div class="stat-num" id="statExams">-</div><div class="stat-label">Total Exams</div></div>
            <div class="stat-card"><div class="stat-num" id="statAttempts">-</div><div class="stat-label">Exam Attempts</div></div>
        </div>
    </div>

    <!-- Manage Exams -->
    <div id="examsSection" class="hidden">
        <div class="section-header">
            <h2>📋 Manage Exams</h2>
            <button class="btn btn-primary" onclick="showCreateExamForm()">+ Create New Exam</button>
        </div>

        <!-- Create/Edit Exam Form -->
        <div id="examForm" class="card hidden">
            <h3 id="examFormTitle">Create New Exam</h3>
            <div class="form-grid">
                <div class="form-group">
                    <label>Exam Title *</label>
                    <input type="text" id="examTitle" placeholder="e.g. Java Programming Basics">
                </div>
                <div class="form-group">
                    <label>Duration (minutes) *</label>
                    <input type="number" id="examDuration" value="30" min="5">
                </div>
                <div class="form-group">
                    <label>Total Marks *</label>
                    <input type="number" id="examTotalMarks" value="10" min="1">
                </div>
                <div class="form-group">
                    <label>Pass Marks *</label>
                    <input type="number" id="examPassMarks" value="6" min="1">
                </div>
                <div class="form-group full-width">
                    <label>Description</label>
                    <textarea id="examDescription" placeholder="Exam description..." rows="3"></textarea>
                </div>
            </div>
            <div class="form-actions">
                <button class="btn btn-primary" onclick="saveExam()">Save Exam</button>
                <button class="btn btn-outline" onclick="cancelExamForm()">Cancel</button>
            </div>
        </div>

        <div id="adminExamsList"></div>
    </div>

    <!-- Questions Modal trigger area -->
    <div id="questionsSection" class="hidden">
        <div class="section-header">
            <button class="btn btn-outline" onclick="showSection('exams')">← Back to Exams</button>
            <h2>❓ Questions for: <span id="currentExamTitle"></span></h2>
            <button class="btn btn-primary" onclick="showAddQuestionForm()">+ Add Question</button>
        </div>

        <div id="addQuestionForm" class="card hidden">
            <h3>Add New Question</h3>
            <div class="form-group">
                <label>Question Text *</label>
                <textarea id="qText" rows="3" placeholder="Enter your question here..."></textarea>
            </div>
            <div class="form-grid">
                <div class="form-group"><label>Option A *</label><input type="text" id="qOptA" placeholder="Option A"></div>
                <div class="form-group"><label>Option B *</label><input type="text" id="qOptB" placeholder="Option B"></div>
                <div class="form-group"><label>Option C *</label><input type="text" id="qOptC" placeholder="Option C"></div>
                <div class="form-group"><label>Option D *</label><input type="text" id="qOptD" placeholder="Option D"></div>
                <div class="form-group">
                    <label>Correct Answer *</label>
                    <select id="qCorrect">
                        <option value="A">A</option>
                        <option value="B">B</option>
                        <option value="C">C</option>
                        <option value="D">D</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Marks</label>
                    <input type="number" id="qMarks" value="1" min="1">
                </div>
            </div>
            <div class="form-actions">
                <button class="btn btn-primary" onclick="saveQuestion()">Add Question</button>
                <button class="btn btn-outline" onclick="document.getElementById('addQuestionForm').classList.add('hidden')">Cancel</button>
            </div>
        </div>

        <div id="questionsList"></div>
    </div>

    <!-- Results -->
    <div id="resultsSection" class="hidden">
        <div class="section-header">
            <h2>📈 All Exam Results</h2>
        </div>
        <div id="adminResultsList"></div>
    </div>

</div>

<script src="js/app.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
